<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AESD Gateway Admin</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f8; }
        .topbar { background: #1f2937; color: white; padding: 16px 20px; font-size: 24px; font-weight: bold; display:flex; justify-content:space-between; align-items:center; }
        .layout { display: flex; height: calc(100vh - 56px); }
        .sidebar { width: 280px; background: #111827; color: white; padding: 20px; box-sizing: border-box; overflow-y:auto; }
        .sidebar h2 { font-size: 18px; margin-top: 16px; margin-bottom: 10px; }
        .sidebar a {
            display:block; color:white; text-decoration:none; padding:10px 12px; border-radius:6px;
            margin-bottom:8px; background:#1f2937;
        }
        .sidebar a:hover, .sidebar a.active { background:#2563eb; }
        .content { flex:1; background:#e5e7eb; }
        iframe { width:100%; height:100%; border:none; background:white; }
        .logout { color:white; text-decoration:none; background:#b91c1c; padding:8px 14px; border-radius:6px; }
    </style>
    <script>
        function setActive(el) {
            document.querySelectorAll('.navlink').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</head>
<body>
    <div class="topbar">
        <div>AESD Gateway Admin Portal</div>
        <a class="logout" href="/cgi-bin/logout.sh" target="_top">Log Out</a>
    </div>
    <div class="layout">
        <div class="sidebar">
            <h2>Device Management</h2>
            <a class="navlink active" onclick="setActive(this)" href="/cgi-bin/all_devices.sh" target="mainframe">Devices Summary</a>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/auth_clients.sh" target="mainframe">Authenticated Devices</a>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/unauth_clients.sh" target="mainframe">Unauthenticated Devices</a>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/permanent_devices.sh" target="mainframe">Blacklist / Whitelist</a>

            <h2>User Account Management</h2>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/user_accounts.sh" target="mainframe">User Accounts</a>

            <h2>Wireless Management</h2>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/wireless_settings.sh" target="mainframe">Wireless Settings</a>

            <h2>System Management</h2>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/portal_customization.sh" target="mainframe">Portal Customization</a>
            <a class="navlink" onclick="setActive(this)" href="/cgi-bin/password_settings.sh" target="mainframe">Password Settings</a>
        </div>
        <div class="content">
            <iframe name="mainframe" src="/cgi-bin/all_devices.sh"></iframe>
        </div>
    </div>
</body>
</html>
