<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AESD Gateway Admin</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }
        .topbar {
            background: #1f2937;
            color: white;
            padding: 16px 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .layout {
            display: flex;
            height: calc(100vh - 56px);
        }
        .sidebar {
            width: 260px;
            background: #111827;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .sidebar .section {
            margin-bottom: 20px;
        }
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            background: #1f2937;
        }
        .sidebar a:hover {
            background: #2563eb;
        }
        .content {
            flex: 1;
            padding: 0;
            background: #e5e7eb;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <div class="topbar">AESD Gateway Admin Portal</div>
    <div class="layout">
        <div class="sidebar">
            <div class="section">
                <h2>Device Management</h2>
                <a href="/cgi-bin/auth_clients.sh" target="mainframe">Authenticated Devices</a>
                <a href="/cgi-bin/unauth_clients.sh" target="mainframe">Unauthenticated Devices</a>
            </div>
        </div>
        <div class="content">
            <iframe name="mainframe" src="/cgi-bin/auth_clients.sh"></iframe>
        </div>
    </div>
</body>
</html>
