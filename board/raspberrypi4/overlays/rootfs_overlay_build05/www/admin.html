<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AESD Gateway Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 30px;
        }
        h1 {
            margin-bottom: 10px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            margin-bottom: 20px;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            background: white;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: #1565c0;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0d47a1;
        }
        .small {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>AESD Gateway Admin Portal</h1>
    <p class="small">Connected clients, DHCP leases, authorization status, and client control.</p>

    <div class="box">
        <form action="/cgi-bin/status.sh" method="get" target="statusframe">
            <button type="submit">Refresh Client Status</button>
        </form>
    </div>

    <div class="box">
        <iframe name="statusframe" src="/cgi-bin/status.sh"></iframe>
    </div>
</body>
</html>
