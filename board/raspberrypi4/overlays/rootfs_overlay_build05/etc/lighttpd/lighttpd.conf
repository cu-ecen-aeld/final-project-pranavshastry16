server.document-root = "/www"
server.port = 80
server.modules = ( "mod_access", "mod_alias", "mod_cgi", "mod_auth", "mod_authn_file" )

index-file.names = ( "index.html" )

mimetype.assign = (
    ".html" => "text/html",
    ".txt"  => "text/plain",
    ".css"  => "text/css",
    ".js"   => "application/javascript"
)

cgi.assign = (
    ".sh" => "/bin/sh"
)

alias.url += (
    "/cgi-bin/" => "/www/cgi-bin/"
)

static-file.exclude-extensions = ( ".sh" )

auth.backend = "plain"
auth.backend.plain.userfile = "/etc/lighttpd/admin.user"

$HTTP["url"] =~ "^/admin|^/cgi-bin/auth_clients.sh|^/cgi-bin/unauth_clients.sh|^/cgi-bin/allow.sh|^/cgi-bin/deauth.sh|^/cgi-bin/status.sh" {
    auth.require = (
        "/" => (
            "method"  => "basic",
            "realm"   => "AESD Gateway Admin",
            "require" => "valid-user"
        )
    )
}
