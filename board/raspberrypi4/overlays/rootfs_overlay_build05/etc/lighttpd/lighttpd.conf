server.document-root = "/www"
server.port = 80
server.modules = ( "mod_access", "mod_alias", "mod_cgi" )

index-file.names = ( "index.html" )

mimetype.assign = (
    ".html" => "text/html",
    ".txt"  => "text/plain",
    ".css"  => "text/css",
    ".js"   => "application/javascript"
)

cgi.assign = (
    ".sh" => "/bin/sh"
)

alias.url += (
    "/cgi-bin/" => "/www/cgi-bin/"
)

static-file.exclude-extensions = ( ".sh" )
